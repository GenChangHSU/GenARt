[build]
publish = 'public'
command = "rm -rf node_modules && npm ci && ls -la node_modules/.bin/ | grep tailwind; hugo --gc --minify"

[build.environment]
HUGO_VERSION = '0.163.3'
NODE_VERSION = '20'
NPM_CONFIG_YES = 'true'

[context]
[context.branch-deploy]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.deploy-preview]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.production]
[context.production.environment]
HUGO_ENV = 'production'
